name: Deploy Website

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: "Git ref (SHA/branch/tag) to deploy; defaults to the triggering ref if omitted"
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2.7.0
        with:
          version: '1'

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd web
          julia --project=. -e 'using Pkg; Pkg.develop(path=".."); Pkg.instantiate(); Pkg.add("NodeJS"); using NodeJS; run(`$(npm_cmd()) install highlight.js`);'

      - name: Pre-generate advisory pages
        run: |
          cd web
          julia --project=. pre_generate.jl --clean

      - name: Build site
        env:
          FRANKLIN_PREPATH: SecurityAdvisories.jl
        run: |
          cd web
          julia --project=. -e 'using Franklin; optimize(prerender=true, minify=false)'

      - name: Process HTML links
        uses: shravanngoswamii/html-link-action@2391fcb0ab8af48941bdfe1bf8eb987834f2c047 # v1.1.0
        with:
          site-dir: web/__site
          nofollow: true

      - name: Build search index
        run: npx pagefind --site web/__site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: web/__site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
