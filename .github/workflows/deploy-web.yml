name: Deploy Website

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: "Git ref (SHA/branch/tag) to deploy; defaults to the triggering ref if omitted"
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3.0.2
        with:
          version: '1'

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd web
          julia --project=. -e 'using Pkg; Pkg.develop(path=".."); Pkg.instantiate(); Pkg.add("NodeJS"); using NodeJS; run(`$(npm_cmd()) install highlight.js`);'

      - name: Pre-generate advisory pages
        run: |
          cd web
          julia --project=. pre_generate.jl --clean

      - name: Build site
        env:
          FRANKLIN_PREPATH: SecurityAdvisories.jl
        run: |
          cd web
          julia --project=. -e 'using Franklin; optimize(prerender=true, minify=false)'

      - name: Process HTML links
        uses: shravanngoswamii/html-link-action@2391fcb0ab8af48941bdfe1bf8eb987834f2c047 # v1.1.0
        with:
          site-dir: web/__site
          nofollow: true

      - name: Build search index
        run: npx pagefind --site web/__site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: web/__site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
