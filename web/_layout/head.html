<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <script>
    (function () {
      var cl = document.documentElement.classList;
      var t = localStorage.getItem('theme');
      if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
      cl.add('no-transition');
    })();
  </script>
  <style>
    :root { color-scheme: light dark; }
    html, body { background-color: #f8f9fb; color: #1b1f27; }
    html[data-theme="dark"], html[data-theme="dark"] body { background-color: #1a1b2e; color: #d0d4e0; }
  </style>
  <title>{{isnotpage /}}{{fill title}} &middot; {{end}}Julia Security Advisories</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="stylesheet" href="/css/site.css">
  <link rel="stylesheet" href="/pagefind/pagefind-ui.css">
  <link rel="alternate" type="application/rss+xml" title="Julia Security Advisories" href="/feed.xml">
</head>

<body>
  <div class="site-wrapper">
    {{insert header.html}}
