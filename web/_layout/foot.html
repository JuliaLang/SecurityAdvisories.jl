  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
    stroke-linejoin="round">

<script>
  (function () {
    window.addEventListener('pageshow', function (e) {
      if (e.persisted) {
        try {
          var t = localStorage.getItem('theme') ||
            (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      }
    });

    var toggle = document.getElementById('theme-toggle');
    if (toggle) toggle.addEventListener('click', function () {
      var t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
      try { localStorage.setItem('theme', t); } catch(e) {}
    });
    var navBtn = document.getElementById('nav-toggle');
    var navPanel = document.getElementById('topbar-nav');
    if (navBtn) navBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      navPanel.classList.toggle('open');
    });
    document.addEventListener('click', function (e) {
      if (navPanel && navPanel.classList.contains('open') && !navPanel.contains(e.target)) {
        navPanel.classList.remove('open');
      }
    });
    if (navPanel) {
      navPanel.querySelectorAll('a').forEach(function (link) {
        link.addEventListener('click', function () { navPanel.classList.remove('open'); });
      });
    }
    var overlay = document.getElementById('search-overlay');
    var loaded = false;
    var pagefindAvailable = typeof PagefindUI !== 'undefined';
    function openSearch() {
      overlay.classList.add('open');
      document.body.classList.add('search-open');
      if (!loaded) {
        loaded = true;
        if (typeof PagefindUI !== 'undefined') {
          new PagefindUI({
            element: '#pagefind-container',
            showImages: false,
            showSubResults: true,
            showEmptyFilters: false
          });
        } else {
          var note = document.getElementById('search-dev-note');
          if (note) note.style.display = 'block';
        }
      }
      setTimeout(function () {
        var inp = overlay.querySelector('.pagefind-ui__search-input');
        if (inp) inp.focus();
      }, 100);
    }
    function closeSearch() {
      overlay.classList.remove('open');
      document.body.classList.remove('search-open');
    }
    document.getElementById('search-open-btn').addEventListener('click', openSearch);
    document.getElementById('search-backdrop').addEventListener('click', closeSearch);
    document.getElementById('search-close-btn').addEventListener('click', closeSearch);
    document.addEventListener('keydown', function (e) {
      if (e.key === '/' && !overlay.classList.contains('open') && !['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName)) {
        e.preventDefault(); openSearch();
      }
      if (e.key === 'Escape' && overlay.classList.contains('open')) closeSearch();
    });

    var btt = document.getElementById('back-to-top');
    if (btt) {
      var showThreshold = 220;

      function updateBtt() {
        if (window.scrollY > showThreshold) {
          btt.classList.add('visible');
        } else {
          btt.classList.remove('visible');
        }
      }

      window.addEventListener('scroll', updateBtt, { passive: true });
      btt.addEventListener('click', function () {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }
  })();
</script>
<script src="/pagefind/pagefind-ui.js" type="text/javascript"></script>
